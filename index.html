<section class="about" id="about">
    <div class="container">
        <h2 class="section-title">About Me</h2>
        <div class="about-content">
            <p>I'm a Systems Analyst with focus on Identity and Access Management (IAM), Active Directory, Entra ID/Azure AD, PowerShell automation, and support for corporate infrastructure and security environments.</p>
            <p>My work involves access administration and analysis routines, Active Directory group validation, user movement between OUs, account creation and blocking, attribute analysis, account status verification, authentication troubleshooting, permissions, server access, and integration between Entra ID and on-premises AD.</p>
            <p>I have hands-on experience with ServiceNow, especially in ticket handling, request analysis, access rule validation, and operational flow automation. I developed an internal application that uses ServiceNow ticket data to guide actions, execute PowerShell commands, reduce manual tasks, and help close tickets more efficiently.</p>
            <p>My differentiator is the combination of operations, automation, and governance vision. I transform repetitive processes into organized, secure, and scalable solutions applying PowerShell, IAM best practices, group analysis, permissions, OU structure, and least privilege principles.</p>
        </div>
    </div>
</section>
